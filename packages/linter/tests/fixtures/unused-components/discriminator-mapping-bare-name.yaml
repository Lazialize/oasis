openapi: 3.0.3
info:
  title: T
  version: "1.0.0"
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  animal:
                    type: object
                    discriminator:
                      propertyName: petType
                      mapping:
                        dog: Dog
                    oneOf: []
components:
  schemas:
    Dog:
      type: object
      properties:
        petType:
          type: string
