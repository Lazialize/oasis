openapi: 3.0.3
info:
  title: T
  version: "1.0.0"
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          $ref: './responses.yaml#/PetResponse'
components:
  schemas:
    Pet:
      discriminator:
        propertyName: petType
        mapping:
          cat: './schemas.yaml#/Cat'
          dog: './schemas.yaml#/MissingDog'
      oneOf:
        - $ref: './schemas.yaml#/Cat'
