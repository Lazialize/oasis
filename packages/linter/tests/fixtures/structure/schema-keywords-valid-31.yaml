openapi: 3.1.0
info:
  title: T
  version: "1.0.0"
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        age:
          type: integer
          minimum: 0
          exclusiveMaximum: 150
        tag:
          $ref: '#/components/schemas/Tag'
          description: an override description alongside $ref, legal in 3.1
        kind:
          type:
            - string
            - "null"
        id:
          const: "pet"
      additionalProperties: false

    Tag:
      type: string
      pattern: '^[a-z]+$'

    BooleanItems:
      type: array
      items: false

    EmptyRequired:
      type: object
      required: []

    AllOnly31Keywords:
      $id: https://schemas.example/example
      $schema: https://json-schema.org/draft/2020-12/schema
      $vocabulary:
        https://schemas.example/vocabulary: true
      $anchor: example
      $dynamicAnchor: node
      $dynamicRef: '#node'
      $comment: for maintainers
      const: 5
      prefixItems: []
      contains:
        type: string
      minContains: 1
      maxContains: 2
      contentMediaType: application/json
      contentEncoding: base64
      contentSchema:
        type: string
      patternProperties: {}
      propertyNames: {}
      unevaluatedProperties: false
      unevaluatedItems: false
      dependentRequired: {}
      dependentSchemas: {}
      if: {}
      then: {}
      else: {}
      $defs: {}
      examples: []
      x-oasis-extension: true
