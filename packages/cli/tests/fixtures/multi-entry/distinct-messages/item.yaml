# A shared Path Item mounted at DIFFERENT path templates by a.yaml (/things/{id}) and b.yaml
# (/objects/{id}). It declares no `in: path` parameter for `{id}`, so `paths/params-defined`
# reports at THIS file's (shared) range under each entry — but with a message that embeds the
# mounting path, so the two diagnostics are contextually distinct and must NOT be merged.
get:
  operationId: getItem
  tags: [items]
  description: Get an item.
  responses:
    '200':
      description: OK
