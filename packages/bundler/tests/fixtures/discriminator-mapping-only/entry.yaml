openapi: 3.0.3
info:
  title: Discriminator mapping-only reference
  version: "1.0.0"
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                discriminator:
                  propertyName: petType
                  mapping:
                    dog: './dog.yaml#/Dog'
                oneOf: []
