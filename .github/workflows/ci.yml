name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (bun)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test

  extension:
    name: VSCode extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Verify LICENSE in VSIX
        run: |
          vsix=$(find . -name '*.vsix' -print -quit)
          if [ -z "$vsix" ]; then
            echo "::error::No .vsix file found"
            exit 1
          fi
          if unzip -l "$vsix" | grep -q 'LICENSE'; then
            echo "✓ LICENSE file found in VSIX"
          else
            echo "::error::LICENSE file not found in VSIX"
            unzip -l "$vsix"
            exit 1
          fi
