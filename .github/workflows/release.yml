name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: >-
          Tag to release (e.g. v1.2.3). Required when this workflow is
          called from another workflow, since there's no tag-push event ref
          to infer it from.
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: linux
            arch: x64
            ext: ""
            archive: tar.gz
          - target: bun-linux-arm64
            os: linux
            arch: arm64
            ext: ""
            archive: tar.gz
          - target: bun-darwin-x64
            os: darwin
            arch: x64
            ext: ""
            archive: tar.gz
          - target: bun-darwin-arm64
            os: darwin
            arch: arm64
            ext: ""
            archive: tar.gz
          - target: bun-windows-x64
            os: windows
            arch: x64
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build packages/cli/src/index.ts --compile --minify \
            --target=${{ matrix.target }} \
            --outfile dist/oasis-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        working-directory: dist
        run: tar -czf oasis-${{ matrix.os }}-${{ matrix.arch }}.tar.gz oasis-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        working-directory: dist
        run: zip oasis-${{ matrix.os }}-${{ matrix.arch }}.zip oasis-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/oasis-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.archive }}
          if-no-files-found: error

  build-extension:
    name: Build VSCode extension
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package

      - name: Verify LICENSE in VSIX
        run: |
          vsix=$(find . -name '*.vsix' -print -quit)
          if [ -z "$vsix" ]; then
            echo "::error::No .vsix file found"
            exit 1
          fi
          if unzip -l "$vsix" | grep -q 'LICENSE'; then
            echo "✓ LICENSE file found in VSIX"
          else
            echo "::error::LICENSE file not found in VSIX"
            unzip -l "$vsix"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-vscode-vsix
          path: editors/vscode/*.vsix
          if-no-files-found: error

  release:
    name: Create release
    needs: [build-cli, build-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.vsix' \) -exec cp {} release/ \;
          cd release
          shasum -a 256 * > SHASUMS256.txt
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: release/*
          generate_release_notes: true

      - name: Upload SHASUMS256.txt
        uses: actions/upload-artifact@v4
        with:
          name: oasis-shasums
          path: release/SHASUMS256.txt
          if-no-files-found: error

  publish-extension:
    name: Publish VSCode extension to Marketplace
    needs: [build-extension, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: oasis-vscode-vsix
          path: vsix

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for VSCE_PAT secret
        id: check-secret
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::notice title=Marketplace publish skipped::VSCE_PAT secret is not configured; skipping VS Code Marketplace publish. See docs/releasing.md to enable it."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Marketplace
        if: steps.check-secret.outputs.skip != 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          vsix=$(find vsix -name '*.vsix' -print -quit)
          if [ -z "$vsix" ]; then
            echo "::error::No .vsix file found in the downloaded artifact"
            exit 1
          fi
          npx --yes @vscode/vsce@3 publish --packagePath "$vsix"

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Check for HOMEBREW_TAP_TOKEN secret
        id: check-secret
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::notice title=Homebrew tap update skipped::HOMEBREW_TAP_TOKEN secret is not configured; skipping the Lazialize/homebrew-oasis update. See docs/releasing.md to enable it."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download SHASUMS256.txt
        if: steps.check-secret.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: oasis-shasums
          path: release-artifacts

      - name: Generate formula
        if: steps.check-secret.outputs.skip != 'true'
        run: |
          mkdir -p tap/Formula
          tag="${{ inputs.tag || github.ref_name }}"
          bun run scripts/homebrew/generate-formula.ts \
            --version "$tag" \
            --shasums release-artifacts/SHASUMS256.txt \
            --out tap/Formula/oasis.rb

      - name: Push formula to Lazialize/homebrew-oasis
        if: steps.check-secret.outputs.skip != 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Lazialize/homebrew-oasis.git" tap-repo
          mkdir -p tap-repo/Formula
          cp tap/Formula/oasis.rb tap-repo/Formula/oasis.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/oasis.rb
          if git diff --cached --quiet -- Formula/oasis.rb; then
            echo "Formula unchanged, nothing to commit."
            exit 0
          fi
          git commit -m "chore: update oasis to ${tag#v}"
          git push origin HEAD
