name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: >-
          Tag to release (e.g. v1.2.3). Required when this workflow is
          called from another workflow, since there's no tag-push event ref
          to infer it from.
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: linux
            arch: x64
            ext: ""
            archive: tar.gz
          - target: bun-linux-arm64
            os: linux
            arch: arm64
            ext: ""
            archive: tar.gz
          - target: bun-darwin-x64
            os: darwin
            arch: x64
            ext: ""
            archive: tar.gz
          - target: bun-darwin-arm64
            os: darwin
            arch: arm64
            ext: ""
            archive: tar.gz
          - target: bun-windows-x64
            os: windows
            arch: x64
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build packages/cli/src/index.ts --compile --minify \
            --target=${{ matrix.target }} \
            --outfile dist/oasis-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        working-directory: dist
        run: tar -czf oasis-${{ matrix.os }}-${{ matrix.arch }}.tar.gz oasis-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        working-directory: dist
        run: zip oasis-${{ matrix.os }}-${{ matrix.arch }}.zip oasis-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/oasis-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.archive }}
          if-no-files-found: error

  build-extension:
    name: Build VSCode extension
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-vscode-vsix
          path: editors/vscode/*.vsix
          if-no-files-found: error

  release:
    name: Create release
    needs: [build-cli, build-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.vsix' \) -exec cp {} release/ \;
          cd release
          shasum -a 256 * > SHASUMS256.txt
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: release/*
          generate_release_notes: true
